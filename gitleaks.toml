title = "Laravel Production Secret Rules"

[allowlist]
description = "Ignore safe directories"
paths = [
  ".git/",
  "vendor/",
  "node_modules/"
]

[[rules]]
id = "generic-env-secret"
description = "Detect any sensitive ENV key assignment"
regex = '''(?i)(password|passwd|pwd|secret|key|token|auth|credential|access|api).*=\s*["'].*["']'''
tags = ["env", "secret"]

[[rules]]
id = "laravel-core-secrets"
description = "Laravel sensitive core config"
regex = '''(?i)(app_key|db_password|jwt_secret|redis_password|aws_secret_access_key).*=\s*["'].*["']'''
tags = ["laravel", "core"]

[[rules]]
id = "aws-keys"
description = "AWS credentials"
regex = '''AKIA[0-9A-Z]{16}|aws_secret_access_key\s*=\s*["'].*["']'''
tags = ["aws", "cloud"]

[[rules]]
id = "enterprise-gateway-secrets"
description = "Detect FAAS / MOLI / NG gateway secrets"
regex = '''(?i)^(MOLI|NGPAY|NGOS|FAAS|CELCOM|DIGI|MMAG|IGW|DASHBOARD|PRODUCT).*=(.+)$'''
tags = ["enterprise", "gateway"]

[[rules]]
id = "sensitive-env-key-names"
description = "Detect sensitive ENV keys regardless of value"
regex = '''(?i)^(.*(password|passwd|pwd|secret|key|token|auth|credential|access).*)=.*$'''
tags = ["env", "key-name"]