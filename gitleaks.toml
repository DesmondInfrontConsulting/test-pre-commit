title = "Laravel Production Secret Rules"

[allowlist]
paths = [
  ".git/",
  "vendor/",
  "node_modules/"
]

# =========================
# 🔐 ALL sensitive ENV KEYS (main rule)
# =========================
[[rules]]
id = "sensitive-env-keys"
description = "Catch any sensitive environment variable"
regex = '''(?i)^(.*(password|passwd|pwd|secret|token|key|auth|credential|access|api)).*=\s*["'].*["']'''
tags = ["env", "secret"]

# =========================
# 🧠 Laravel core secrets
# =========================
[[rules]]
id = "laravel-core"
description = "Laravel core sensitive values"
regex = '''(?i)^(APP_KEY|DB_PASSWORD|JWT_SECRET|REDIS_PASSWORD|AWS_SECRET_ACCESS_KEY)\s*=\s*.+$'''
tags = ["laravel", "core"]

# =========================
# ☁️ AWS keys
# =========================
[[rules]]
id = "aws-keys"
description = "AWS access keys"
regex = '''AKIA[0-9A-Z]{16}|aws_secret_access_key\s*=\s*.+'''
tags = ["aws"]

# =========================
# 🏢 Enterprise systems (FAAS / NG / MOLI)
# =========================
[[rules]]
id = "enterprise-systems"
description = "Enterprise gateway systems (FAAS, MOLI, NG, etc.)"
regex = '''(?i)^(.*(FAAS|MOLI|NGPAY|NGOS|CELCOM|DIGI|MMAG|IGW|DASHBOARD|PRODUCT).*(KEY|SECRET|PASSWORD|TOKEN|AUTH)).*=\s*.+$'''
tags = ["enterprise"]